name: PRAJNA CI/CD Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install
          npm install -g aws-cdk ts-node typescript

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to AWS (Correct Order)
        run: |
          cd infrastructure
          # 1. Deploy Foundation first to CREATE the SSM parameters
          npx cdk deploy PrajnaFoundationStack --require-approval never
          # 2. Now deploy the rest which LOOK UP those parameters
          npx cdk deploy --all --require-approval never
