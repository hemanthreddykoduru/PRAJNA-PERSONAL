name: PRAJNA CI/CD Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Global CLI
        run: npm install -g aws-cdk ts-node typescript @types/node

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Full Clean Install and Deploy Infrastructure
        run: |
          rm -f package-lock.json
          rm -rf node_modules
          npm install @types/node
          npm install
          
          cd infrastructure
          npx cdk deploy PrajnaFoundationStack --require-approval never
          npx cdk deploy --all --require-approval never

      - name: Build and Upload Frontend
        run: |
          # 1. Get the Bucket Name from the NEW V3 SSM Parameter
          BUCKET_NAME=$(aws ssm get-parameter --name "/prajna/v3/bucket-name" --query "Parameter.Value" --output text)
          
          # 2. Build Frontend
          cd packages/frontend
          rm -rf node_modules
          npm install --platform=linux --arch=x64
          npm run build
          
          # 3. Upload to S3
          if [ -d "dist" ]; then
            aws s3 sync dist/ s3://$BUCKET_NAME --delete
          else
            echo "Build failed to produce dist folder!"
            exit 1
          fi
          
          # 4. Invalidate CloudFront
          DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[0].Id" --output text)
          aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "/*"
